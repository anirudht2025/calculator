<!doctype html>
<html lang="en">
  <head>
    <title>Calculator</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        min-height: 100vh;
      }

      .calculator {
        width: 380px;
        background: #fff;
        border-radius: 20px;
        padding: 25px;
      }

      #editor {
        height: 70px;
        font-size: 30px;
        text-align: right;
        font-weight: bold;
        border-radius: 12px;
      }

      td {
        padding: 6px;
      }

      .btn {
        width: 100%;
        height: 60px;
        font-size: 22px;
        font-weight: bold;
        border-radius: 12px;
        transition: 0.2s;
      }

      .btn:hover {
        transform: scale(0.96);
      }
    </style>

    <script src="script.js"></script>
  </head>

  <body>
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      <div class="calculator shadow-lg">
        <!-- <h2 class="text-center fw-bold mb-4">Calculator</h2> -->

        <table class="w-100">
          <tr>
            <td colspan="4">
              <input
                type="text"
                id="editor"
                class="form-control mb-2"
                readonly
              />
            </td>
          </tr>

          <tr>
            <td colspan="2">
              <button class="btn btn-danger" onclick="clearAll()">AC</button>
            </td>

            <td colspan="2">
              <button class="btn btn-warning text-dark" onclick="clearOne()">
                ⌫
              </button>
            </td>
          </tr>

          <tr>
            <td>
              <button class="btn btn-light" onclick="setEditor(event)">
                9
              </button>
            </td>
            <td>
              <button class="btn btn-light" onclick="setEditor(event)">
                8
              </button>
            </td>
            <td>
              <button class="btn btn-light" onclick="setEditor(event)">
                7
              </button>
            </td>
            <td>
              <button class="btn btn-primary" onclick="setEditor(event)">
                +
              </button>
            </td>
          </tr>

          <tr>
            <td>
              <button class="btn btn-light" onclick="setEditor(event)">
                6
              </button>
            </td>
            <td>
              <button class="btn btn-light" onclick="setEditor(event)">
                5
              </button>
            </td>
            <td>
              <button class="btn btn-light" onclick="setEditor(event)">
                4
              </button>
            </td>
            <td>
              <button class="btn btn-primary" onclick="setEditor(event)">
                −
              </button>
            </td>
          </tr>

          <tr>
            <td>
              <button class="btn btn-light" onclick="setEditor(event)">
                3
              </button>
            </td>
            <td>
              <button class="btn btn-light" onclick="setEditor(event)">
                2
              </button>
            </td>
            <td>
              <button class="btn btn-light" onclick="setEditor(event)">
                1
              </button>
            </td>
            <td>
              <button class="btn btn-primary" onclick="setEditor(event)">
                ×
              </button>
            </td>
          </tr>

          <tr>
            <td>
              <button class="btn btn-light" onclick="setEditor(event)">
                0
              </button>
            </td>
            <td>
              <button class="btn btn-secondary" onclick="setEditor(event)">
                .
              </button>
            </td>
            <td>
              <button class="btn btn-success" onclick="getResult()">=</button>
            </td>
            <td>
              <button class="btn btn-primary" onclick="setEditor(event)">
                ÷
              </button>
            </td>
          </tr>
        </table>
      </div>
    </div>
  </body>
</html>
